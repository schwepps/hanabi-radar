name: CI

on:
  push:
  pull_request:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

env:
  NEXT_TELEMETRY_DISABLED: '1'
  HUSKY: '0' # skip git hooks on CI runners

jobs:
  quality:
    name: Lint, typecheck, build & test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      # pnpm must be set up before setup-node, whose `cache: pnpm` shells out to pnpm.
      - name: Setup pnpm
        uses: pnpm/action-setup@0ebf47130e4866e96fce0953f49152a61190b271 # v6.0.9

      - name: Setup Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Format check
        run: pnpm format:check

      - name: Lint
        run: pnpm lint

      - name: Typecheck
        run: pnpm typecheck

      - name: Build
        run: pnpm build

      - name: Test
        run: pnpm test

  database:
    name: Migrations, pgTAP, type sync & ingest e2e
    runs-on: ubuntu-latest # GitHub-hosted runners ship Docker, needed by the Supabase CLI
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Setup pnpm
        uses: pnpm/action-setup@0ebf47130e4866e96fce0953f49152a61190b271 # v6.0.9

      - name: Setup Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Start local Supabase
        run: pnpm supabase start

      # Rebuild the whole schema from migrations + seed on a clean database
      # (validates the AC that `db reset` rebuilds from scratch); a failed
      # migration or a broken reset fails the job here.
      - name: Reset database from migrations
        run: pnpm db:reset

      - name: Run pgTAP schema tests
        run: pnpm db:test

      # Regenerate types and fail if they differ from the committed file, so a
      # schema change that forgot `pnpm db:types` cannot land.
      - name: Check generated types are in sync with migrations
        run: |
          pnpm db:types
          if ! git diff --exit-code -- src/types/database.ts; then
            echo "::error::src/types/database.ts is out of sync with the migrations. Run 'pnpm db:types' and commit the result."
            exit 1
          fi

      # Run the cross-repo /api/ingest contract matrix against a live dev server
      # backed by the Supabase stack booted above. Catches HTTP/DB contract drift (e.g. the
      # issues[].path string-vs-array mismatch) that stubbed unit tests + pgTAP miss.
      - name: Export local Supabase keys for the dev server
        run: |
          pnpm supabase status -o env | sed -nE \
            -e 's/^API_URL="?([^"]*)"?$/NEXT_PUBLIC_SUPABASE_URL=\1/p' \
            -e 's/^ANON_KEY="?([^"]*)"?$/NEXT_PUBLIC_SUPABASE_ANON_KEY=\1/p' \
            -e 's/^SERVICE_ROLE_KEY="?([^"]*)"?$/SUPABASE_SERVICE_ROLE_KEY=\1/p' \
            >> "$GITHUB_ENV"

      - name: Ingest contract matrix (e2e)
        run: |
          pnpm dev > /tmp/dev.log 2>&1 &
          DEV_PID=$!
          # Wait until the dev server answers (405 on GET /api/ingest means it is up).
          for _ in $(seq 1 60); do
            code=$(curl -s -o /dev/null -w '%{http_code}' http://127.0.0.1:3000/api/ingest || true)
            if [ "${code:-000}" != "000" ]; then break; fi
            sleep 2
          done
          set +e
          pnpm e2e:ingest
          rc=$?
          set -e
          kill "$DEV_PID" 2>/dev/null || true
          if [ "$rc" -ne 0 ]; then
            echo "----- dev server log (tail) -----"
            tail -n 50 /tmp/dev.log
          fi
          exit "$rc"
